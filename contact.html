<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact | Abhishek Dixit</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="navbar">
  <div class="nav-container">
    <div class="logo">AD</div>
    <nav class="nav-links" id="navLinks">
      <a href="index.html" class="nav-item">Home</a>
      <a href="projects.html" class="nav-item">Projects</a>
      <a href="gallery.html" class="nav-item">Gallery</a>
      <a href="skills.html" class="nav-item">Skills</a>
      <a href="certificates.html" class="nav-item">Certificates</a>
      <a href="blog.html" class="nav-item">Blog</a>
      <a href="resume.html" class="nav-item">Resume</a>
      <a href="about.html" class="nav-item">About</a>
      <a href="contact.html" class="nav-item active">Contact</a>
    </nav>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
  </div>
</header>

<main>
<section class="contact-section">
  <h1>Let’s Connect & Collaborate 🤝</h1>
  <p class="contact-subtitle">
    Whether it’s a new project, collaboration, or just to say hi — I’d love to hear from you!
  </p>

  <div class="contact-icons">
    <a href="https://github.com/" target="_blank" class="social-icon"><i class="fa-brands fa-github"></i></a>
    <a href="https://linkedin.com/" target="_blank" class="social-icon"><i class="fa-brands fa-linkedin-in"></i></a>
    <a href="mailto:youremail@gmail.com" class="social-icon"><i class="fa-solid fa-envelope"></i></a>
    <a href="https://wa.me/918000000000" target="_blank" class="social-icon"><i class="fa-brands fa-whatsapp"></i></a>
    <a href="https://instagram.com/" target="_blank" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
    <a href="https://facebook.com/" target="_blank" class="social-icon"><i class="fa-brands fa-facebook-f"></i></a>
  </div>

  <form class="contact-form" onsubmit="return sendMessage(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="subject" placeholder="Subject" required>
    <textarea id="message" placeholder="Your Message..." rows="5" required></textarea>
    <button type="submit"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
  </form>
</section>
</main>

<footer>© 2025 Abhishek Dixit</footer>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}

function sendMessage(e) {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const subject = document.getElementById("subject").value.trim();
  const message = document.getElementById("message").value.trim();

  if (!name || !subject || !message) {
    alert("Please fill out all fields!");
    return false;
  }

  alert(`Thanks ${name}! Your message has been sent successfully 🚀`);
  document.querySelector(".contact-form").reset();
}
</script>

</body>
</html>
